id: CORRIDOR_09
name: "Bilabial Cluster Exchange"
description: >
  Arabic bilabial consonants (ب bā', ف fā') freely alternate with
  English bilabials (b, p, f, v) as a phonological class. Empirical
  data shows ب→p (22%) is nearly as common as ب→b (34%), and ف splits
  three ways: f (31%), p (25%), v (9%). The bilabial cluster {b,p,f,v}
  functions as a single phonological unit for cross-family matching.
attested_examples:
  - example: "بيت (bayt, 'house') → English 'booth' (b→b preserved)"
    notes: "Direct bilabial preservation"
  - example: "بحر (baḥr, 'sea') → Latin 'pelagus' (b→p voicing shift)"
    notes: "b→p voicing alternation via Greek pelagos"
  - example: "فرس (faras, 'horse') → Latin 'paraveredus' → French 'palefroi' (f→p)"
    notes: "f→p labial shift through Latin pathway"
  - example: "ف (f) → English v in intervocalic position"
    notes: "Lenition: f→v is regular in Germanic languages"
sources:
  - "Consonant Correspondence Matrix: 861 pairs, 3,461 alignments"
  - "Standard phonological analysis: labial voicing alternation"
empirical_evidence:
  ba_to_b: 56
  ba_to_p: 37
  fa_to_f: 39
  fa_to_p: 31
  fa_to_v: 11
  total_bilabial_observations: 290
  cluster_consistency: "84% of bilabial Arabic consonants map to bilabial English consonants"
limitations:
  - "Bilabials are among the most common consonants — high chance overlap"
  - "b↔p and f↔v alternation occurs within language families too (not unique to cross-family)"
  - "Needs additional consonant evidence to distinguish from coincidence"
validation_notes:
  - "Bilabial match alone is weak evidence — require at least 1 non-bilabial consonant match"
  - "Weight bilabial matches at 0.8× compared to rare consonant matches (q, ṭ)"
  - "Test: is bilabial-only match rate significantly above random?"
language_pairs: ["ara-eng", "ara-lat", "ara-fra", "ara-spa"]
lv1_support: "Indirect — binary roots with bilabials show coherence in LV1 H2"
discovery_method: "direct_skeleton"
