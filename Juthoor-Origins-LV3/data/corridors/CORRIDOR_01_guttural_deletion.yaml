id: CORRIDOR_01
name: "Guttural Deletion (Khashim's Law)"
description: >
  Arabic pharyngeal and velar consonants (ع ʿayn, غ ghayn, ح ḥā', خ ḫā')
  are systematically deleted or reduced to /h/ when words cross into
  Indo-European languages. This is the most empirically validated
  correspondence in the dataset (88% deletion rate for ع).
attested_examples:
  - example: "عين (ʿayn, 'eye/spring') → English 'eye' (guttural ع deleted)"
    notes: "Position 1 guttural deletion, preserved in Hebrew עין"
  - example: "عقل (ʿaql, 'reason') → English 'equal' (ع deleted, q→c)"
    notes: "Combined guttural deletion + velar shift"
  - example: "عرب (ʿarab) → English 'Arab' (ع → silent in English)"
    notes: "Direct borrowing shows deletion pattern"
  - example: "حرب (ḥarb, 'war') → English 'harpoon' (ح → h)"
    notes: "ح reduces to h rather than full deletion"
  - example: "خمر (ḫamr, 'wine') → English 'chemistry' via Greek khēmeia"
    notes: "خ → ch/kh in Greek pathway"
sources:
  - "Mazen Hammoude, Beyond the Name — etymology research"
  - "Consonant Correspondence Matrix: 3,461 alignments from 861 pairs"
  - "LV1 Research Factory: H2 field coherence (binary roots with gutturals)"
empirical_evidence:
  ع_deletion_rate: 0.88
  ع_to_h_rate: 0.12
  غ_deletion_rate: 0.62
  غ_to_g_rate: 0.38
  total_observations: 152
limitations:
  - "Cannot distinguish inherited cognate from loanword when ع is deleted"
  - "Some ع→h correspondences may be false positives (h is common in English)"
  - "Direction of borrowing is ambiguous without chronological evidence"
validation_notes:
  - "Compare against null model: random consonant deletion should occur at ~5% per position"
  - "ع deletion at 88% is 17.6x expected by chance — highly significant"
  - "Cross-validate with Hebrew (ע preserved) and Aramaic (ע preserved)"
  - "If Arabic ع → Hebrew ע → English O, that confirms deletion happened post-Semitic"
language_pairs: ["ara-eng", "ara-lat", "ara-grc"]
lv1_support: "H2 (field coherence for binary roots containing gutturals)"
discovery_method: "guttural_projection"
