id: CORRIDOR_04
name: "Metathesis Preservation"
description: >
  Consonant order reversal (metathesis) between Arabic and other languages
  preserves the same consonant set but in different positions. LV1
  hypothesis H5 showed consonant order IS meaningful — metathesis pairs
  share 52.6% semantic similarity (vs 50.2% random), confirming that
  reordered roots retain partial meaning.
attested_examples:
  - example: "رجل (r-j-l, 'leg/foot') → English 'leg' (l-g, reversed r-j → l-g)"
    notes: "Classic metathesis: rjl read backwards approximates 'leg'"
  - example: "كبر (k-b-r, 'big') → English 'bicker/bigger' (b-k-r, consonant swap)"
    notes: "k-b swap preserves both consonants"
  - example: "رمس (r-m-s) → English 'smear' (s-m-r, reversal of r-m-s)"
    notes: "Full reversal with preserved consonant inventory"
sources:
  - "LV1 Research Factory: H5 (order matters) — Wilcoxon p=0.014"
  - "LV1 promoted: metathesis_pairs.jsonl (166 families)"
empirical_evidence:
  method_fires: 462
  strongest_for: "Hebrew (212 fires, 9.8% of ara-heb leads)"
  lv1_h5_mean_similarity: 0.526
  lv1_h5_random_baseline: 0.502
limitations:
  - "Any 3-consonant sequence has a 1/6 chance of matching in some order by accident"
  - "Metathesis preserves consonants but may shift meaning significantly"
  - "Difficult to distinguish from coincidental consonant overlap"
validation_notes:
  - "Test: do metathesis-detected pairs have higher semantic similarity than random?"
  - "Use LV1 metathesis_pairs.jsonl as positive control"
  - "Expected false positive rate: ~16.7% (1/6 random order match for 3 consonants)"
language_pairs: ["ara-heb", "ara-eng", "ara-grc", "ara-lat"]
lv1_support: "H5 (order matters — metathesis pairs retain ~52.6% meaning)"
discovery_method: "metathesis"
